<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambient Player</title>
<style>
body{
    margin:0;background:#000;color:#fff;font-family:sans-serif;
    display:flex;justify-content:center;align-items:center;
    height:100vh;overflow:hidden;
}
#dropzone{
    position:relative;width:min(90vw,1000px);aspect-ratio:16/9;
    border-radius:20px;overflow:hidden;
    display:flex;justify-content:center;align-items:center;
    background:#111;cursor:pointer;
}
.ambient{
    position:absolute;inset:-10%;width:150%;height:150%;
    object-fit:cover;filter:blur(100px) brightness(.8);
    transform:scale(1.5);opacity:0;transition:opacity .8s ease;
    z-index:0;pointer-events:none;
}
.main{
    position:relative;max-width:100%;max-height:100%;
    object-fit:contain;border-radius:12px;
    box-shadow:0 0 40px rgba(0,0,0,.5);z-index:1;
}
#hint{position:absolute;z-index:5;text-align:center;color:#ccc;}
#picker{
    margin-top:15px;padding:12px 20px;border:none;border-radius:999px;
    background:rgba(255,255,255,.12);color:#fff;
    backdrop-filter:blur(12px);
}
</style>
</head>
<body>
<div id="dropzone">
    <div id="hint">
        <div>画像または動画をドロップ</div><br>
        <input type="file" id="picker" accept="image/*,video/*" multiple>
    </div>
</div>

<script>
const dropzone=document.getElementById("dropzone");
const picker=document.getElementById("picker");
const hint=document.getElementById("hint");

let playlist=[];
let currentIndex=0;
let imageTimer=null;
let currentObjectURL=null;

function prevent(e){e.preventDefault();}
["dragenter","dragover","dragleave","drop"].forEach(ev=>{
 document.addEventListener(ev,prevent);
});

document.addEventListener("drop",(e)=>{
 const files=[...e.dataTransfer.files];
 if(files.length) loadFiles(files);
});

picker.addEventListener("change",(e)=>{
 loadFiles([...e.target.files]);
});

function loadFiles(files){
 playlist=files.filter(f=>f.type.startsWith("image/")||f.type.startsWith("video/"));
 if(!playlist.length) return;
 currentIndex=0;
 hint.style.display="none";
 playCurrent();
}

function nextMedia(){
 if(!playlist.length) return;
 currentIndex=(currentIndex+1)%playlist.length;
 playCurrent();
}

function clearPlayer(){
 clearTimeout(imageTimer);

 const oldMain=dropzone.querySelector(".main");
 const oldAmbient=dropzone.querySelector(".ambient");

 if(oldMain){ oldMain.pause?.(); oldMain.remove(); }
 if(oldAmbient){ oldAmbient.pause?.(); oldAmbient.remove(); }

 if(currentObjectURL){
   URL.revokeObjectURL(currentObjectURL);
   currentObjectURL=null;
 }
}

function playCurrent(){
 clearPlayer();
 const file=playlist[currentIndex];
 const url=URL.createObjectURL(file);
 currentObjectURL=url;

 if(file.type.startsWith("image/")) showImage(url);
 else showVideo(url);
}

function showImage(url){
 const ambient=document.createElement("img");
 const main=document.createElement("img");

 ambient.className="ambient";
 main.className="main";
 ambient.src=url;
 main.src=url;

 dropzone.appendChild(ambient);
 dropzone.appendChild(main);

 requestAnimationFrame(()=>ambient.style.opacity="1");

 if(playlist.length>1){
   imageTimer=setTimeout(nextMedia,8000);
 }
}

function showVideo(url){
 const bg=document.createElement("video");
 const video=document.createElement("video");

 bg.className="ambient";
 video.className="main";

 bg.src=url;
 video.src=url;

 bg.muted=true;
 bg.playsInline=true;

 video.controls=true;
 video.autoplay=true;
 video.playsInline=true;

 dropzone.appendChild(bg);
 dropzone.appendChild(video);

 video.addEventListener("loadedmetadata",()=>{
   const ratio=video.videoWidth/video.videoHeight;

   if(ratio>1.5){
      bg.style.width="125%";
      bg.style.height="125%";
      bg.style.transform="scale(1.25)";
      bg.style.filter="blur(80px) brightness(.8)";
   }else if(ratio<0.8){
      bg.style.width="180%";
      bg.style.height="180%";
      bg.style.transform="scale(1.8)";
      bg.style.filter="blur(120px) brightness(.8)";
   }

   bg.style.opacity="1";
 });

 video.addEventListener("play",()=>bg.play().catch(()=>{}));
 video.addEventListener("pause",()=>bg.pause());
 video.addEventListener("seeking",()=>bg.currentTime=video.currentTime);

 video.addEventListener("timeupdate",()=>{
   if(Math.abs(bg.currentTime-video.currentTime)>0.3){
      bg.currentTime=video.currentTime;
   }
 });

 video.addEventListener("ended",()=>{
   if(playlist.length>1) nextMedia();
 });

 video.play().catch(()=>{});
}

dropzone.addEventListener("click",(e)=>{
 if(e.target===picker || e.target.closest("#hint")) return;
 if(e.target.classList.contains("main")) return;

 if(!document.fullscreenElement){
   dropzone.requestFullscreen?.();
 }else{
   document.exitFullscreen?.();
 }
});
</script>

    <script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

    
</body>
</html>
